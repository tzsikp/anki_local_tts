name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest -q

      - name: Build .ankiaddon
        run: uv run python scripts/build_addon.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/local_tts-*.ankiaddon
          generate_release_notes: true
          body: |
            ## Install

            Easiest: install from [AnkiWeb](https://ankiweb.net/shared/info/1279936795)
            via Tools → Add-ons → Get Add-ons in Anki.

            Otherwise, download `local_tts.ankiaddon` below and double-click it;
            Anki will prompt you to install. Or use the dev symlink workflow
            described in the [README](https://github.com/${{ github.repository }}#install-developer--current-state).
